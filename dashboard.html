<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TailorTech — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F0EDE6; --cream-dark: #E5E1D8; --cream-mid: #EBE7DF;
  --ink: #1A1916; --ink-mid: #4A4844; --ink-light: #8A8880; --ink-faint: #C0BDB8;
  --white: #FAFAF8; --border: rgba(26,25,22,0.10); --border-mid: rgba(26,25,22,0.20);
  --gold: #B8924A;
}
body {
  font-family: 'Jost', sans-serif; background: var(--cream);
  color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; font-family: inherit; }


/* ── Loading ── */
#loading {
  min-height: calc(100vh - 52px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
.loader {
  width: 24px; height: 24px;
  border: 1.5px solid var(--border-mid); border-top-color: var(--ink);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { font-size: 11px; letter-spacing: 0.10em; color: var(--ink-faint); text-transform: uppercase; }

/* ── Page ── */
#main { display: none; }
.page { max-width: 1020px; margin: 0 auto; padding: 48px 28px 80px; }

/* ── Welcome ── */
.welcome { margin-bottom: 40px; }
.welcome-eyebrow {
  font-size: 10px; font-weight: 600; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px;
}
.welcome h1 { font-size: 26px; font-weight: 300; letter-spacing: -0.01em; color: var(--ink); }

/* ── Stats ── */
.stats { display: flex; gap: 1px; margin-bottom: 48px; background: var(--border); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
.stat { flex: 1; background: var(--white); padding: 20px 22px; }
.stat-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
.stat-val { font-size: 22px; font-weight: 300; color: var(--ink); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--ink-faint); margin-top: 4px; letter-spacing: 0.02em; }

/* ── Section ── */
.sec-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px;
}
.sec-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-light);
}
.sec-gap { height: 48px; }

/* ── Action link ── */
.sec-action {
  font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 500;
  letter-spacing: 0.10em; text-transform: uppercase;
  background: none; border: none; color: var(--ink-light); cursor: pointer;
  transition: color 0.15s; display: inline-flex; align-items: center; gap: 5px;
  text-decoration: none;
}
.sec-action:hover { color: var(--ink); }

/* ── Cards grid (quick actions) ── */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 48px; }
.action-card {
  background: var(--white); padding: 28px 24px 22px;
  cursor: pointer; transition: background 0.15s;
  display: flex; flex-direction: column;
}
.action-card:hover { background: var(--cream-mid); }
.action-card-icon {
  width: 36px; height: 36px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-mid);
}
.action-card-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; letter-spacing: 0.01em; }
.action-card-desc  { font-size: 12px; color: var(--ink-light); line-height: 1.55; flex: 1; }
.action-card-cta {
  margin-top: 20px; font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint);
  display: flex; align-items: center; gap: 6px; transition: color 0.15s;
}
.action-card:hover .action-card-cta { color: var(--ink); }

/* ── Table ── */
.table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 48px; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 12px 18px;
  font-size: 9px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-faint);
  border-bottom: 1px solid var(--border); background: var(--cream-mid);
}
.data-table td {
  padding: 14px 18px; font-size: 13px; color: var(--ink);
  border-bottom: 1px solid var(--border);
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--cream-mid); }
.status {
  display: inline-block; padding: 3px 8px; border-radius: 1px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase;
}
.s-new     { background: rgba(26,25,22,0.06); color: var(--ink-mid); }
.s-prog    { background: rgba(184,146,74,0.12); color: #7a5e2a; border: 1px solid rgba(184,146,74,0.3); }
.s-done    { background: rgba(61,122,90,0.10); color: #2a5c3f; border: 1px solid rgba(61,122,90,0.25); }
.s-cancel  { background: rgba(160,64,64,0.08); color: #7a2c2c; border: 1px solid rgba(160,64,64,0.2); }

/* ── Meas chips ── */
.meas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1px; background: var(--border); }
.meas-chip { background: var(--white); padding: 16px 18px; }
.meas-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
.meas-val { font-size: 20px; font-weight: 300; color: var(--ink); }
.meas-unit { font-size: 11px; color: var(--ink-faint); margin-left: 2px; }

/* ── Profile ── */
.profile-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
.profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 0; }
.pf {
  padding: 18px 20px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.pf:last-child { border-right: none; }
.pf-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 5px; }
.pf-val { font-size: 13px; color: var(--ink); }
.pf-val.empty { color: var(--ink-faint); font-style: italic; }

/* ── Edit form ── */
.edit-form { display: none; padding: 24px; border-top: 1px solid var(--border); background: var(--cream-mid); }
.edit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 18px; }
.ef { display: flex; flex-direction: column; }
.ef label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 6px; }
.ef input {
  font-family: 'Jost', sans-serif; font-size: 13px;
  padding: 9px 12px; background: var(--white);
  border: 1px solid var(--border-mid); border-radius: 2px;
  color: var(--ink); outline: none; transition: border-color 0.15s;
  -webkit-appearance: none;
}
.ef input:focus { border-color: var(--ink); }
.ef input::placeholder { color: var(--ink-faint); }
.edit-btns { display: flex; gap: 10px; }
.btn-save {
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 11px 24px; background: var(--ink); color: var(--white);
  border: none; border-radius: 2px; cursor: pointer; transition: background 0.15s;
  display: inline-flex; align-items: center; gap: 7px;
}
.btn-save:hover { background: #2d2c29; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-cancel {
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: 0.10em; text-transform: uppercase;
  padding: 11px 20px; background: transparent;
  border: 1px solid var(--border-mid); border-radius: 2px;
  color: var(--ink-mid); cursor: pointer; transition: all 0.15s;
}
.btn-cancel:hover { background: var(--white); }
.spin-sm {
  width: 12px; height: 12px;
  border: 1.5px solid rgba(255,255,255,0.3); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.65s linear infinite; display: none;
}

/* ── Empty state ── */
.empty { padding: 40px 24px; text-align: center; }
.empty-icon { color: var(--ink-faint); margin-bottom: 12px; }
.empty p { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.04em; margin-bottom: 20px; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--white);
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
  padding: 12px 22px; border-radius: 2px;
  opacity: 0; transition: opacity 0.25s, transform 0.25s;
  pointer-events: none; z-index: 9999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.err  { background: #7a2c2c; }

@media(max-width:600px){
  .page { padding: 32px 16px 60px; }
  .stats { flex-wrap: wrap; }
  .data-table th:nth-child(3), .data-table td:nth-child(3),
  .data-table th:nth-child(4), .data-table td:nth-child(4) { display: none; }
}


.account-popover {
  position: fixed; top: 60px; right: 28px;
  width: min(320px, calc(100vw - 32px));
  background: var(--white); border: 1px solid var(--border-mid);
  border-radius: 2px; box-shadow: 0 18px 52px rgba(26,25,22,0.16);
  padding: 20px; z-index: 9999; display: none;
}
.account-popover.open { display: block; } /* fallback */
.account-popover::before {
  content: ''; position: absolute; top: -7px; right: 12px;
  width: 12px; height: 12px; background: var(--white);
  border-left: 1px solid var(--border-mid); border-top: 1px solid var(--border-mid);
  transform: rotate(45deg);
}
.account-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.account-av-lg {
  width: 40px; height: 40px; border-radius: 50%; background: var(--ink);
  color: var(--white); font-size: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
.account-av-lg img { width: 100%; height: 100%; object-fit: cover; }
.account-fullname { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
.account-subemail { font-size: 11px; color: var(--ink-light); }
.account-divider { height: 1px; background: var(--border); margin: 0 0 14px; }
.account-title { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 14px; }
.account-row { margin-bottom: 10px; }
.account-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 4px; }
.account-val { font-size: 12px; color: var(--ink); background: var(--cream-mid); border: 1px solid var(--border); padding: 7px 10px; border-radius: 2px; word-break: break-all; }
.account-actions { display: flex; gap: 8px; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; flex-wrap: wrap; }
.account-copy { font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; padding: 7px 12px; border: 1px solid var(--border-mid); background: transparent; color: var(--ink-mid); border-radius: 2px; cursor: pointer; transition: all 0.15s; }
.account-copy:hover { background: var(--cream-mid); color: var(--ink); }
.account-copy.danger { color: #8a3030; border-color: rgba(138,48,48,0.25); }
.account-copy.danger:hover { background: rgba(138,48,48,0.06); }

/* ── Nav ── */
.nav {
  height: 52px; background: var(--white); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 28px; gap: 16px;
  position: sticky; top: 0; z-index: 500;
  position: relative;
}
.nav-brand {
  font-size: 12px; font-weight: 600; letter-spacing: 0.20em;
  text-transform: uppercase; color: var(--ink); margin-right: auto; text-decoration: none;
}
.nav-btn {
  font-family: 'Jost', sans-serif; font-size: 11px; font-weight: 500;
  letter-spacing: 0.10em; text-transform: uppercase;
  padding: 7px 16px; border: 1px solid var(--border-mid); border-radius: 2px;
  background: transparent; color: var(--ink-mid); cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
}
.nav-btn:hover { background: var(--cream-mid); color: var(--ink); }
.nav-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--ink); color: var(--white);
  font-size: 11px; font-weight: 600; letter-spacing: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
  border: none; padding: 0; cursor: pointer;
  -webkit-appearance: none;
}
.nav-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ── Account popover ── */
.account-popover {
  position: fixed; top: 60px; right: 28px;
  width: min(340px, calc(100vw - 32px));
  background: var(--white); border: 1px solid var(--border-mid);
  border-radius: 2px; box-shadow: 0 18px 48px rgba(26,25,22,0.16);
  padding: 18px; z-index: 999; display: none;
}
.account-popover.open { display: block; } /* fallback */
.account-popover::before {
  content: ''; position: absolute; top: -7px; right: 10px;
  width: 12px; height: 12px; background: var(--white);
  border-left: 1px solid var(--border-mid); border-top: 1px solid var(--border-mid);
  transform: rotate(45deg);
}
.account-title { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 14px; }
.account-row { margin-bottom: 12px; }
.account-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 4px; }
.account-val { font-size: 12px; color: var(--ink); word-break: break-all; background: var(--cream-mid); border: 1px solid var(--border); padding: 8px 10px; border-radius: 2px; }
.account-actions { display: flex; gap: 8px; margin-top: 14px; }
.account-copy { font-size: 10px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; padding: 7px 12px; border: 1px solid var(--border-mid); background: transparent; color: var(--ink-mid); border-radius: 2px; cursor: pointer; }
.account-copy:hover { background: var(--cream-mid); color: var(--ink); }

</style>
</head>
<body>

<div id="toast"></div>

<!-- Nav -->
<nav class="nav" style="position:sticky;top:0;z-index:500;">
  <a class="nav-brand" href="https://tailortech.toom.design/">TailorTech</a>

  <!-- Avatar button -->
  <button class="nav-avatar" id="nav-av" type="button"
    style="position:relative;"
    onclick="(function(e){
      e.stopPropagation();
      var d = document.getElementById('nav-dropdown');
      d.style.display = (d.style.display === 'block') ? 'none' : 'block';
    })(event)">
  </button>

  <!-- Dropdown — sits inside nav so z-index is guaranteed -->
  <div id="nav-dropdown" style="
    display:none;
    position:absolute;
    top:52px;
    right:0;
    width:300px;
    background:#FAFAF8;
    border:1px solid rgba(26,25,22,0.20);
    border-radius:2px;
    box-shadow:0 12px 40px rgba(26,25,22,0.16);
    padding:20px;
    z-index:9999;
    font-family:'Jost',sans-serif;
  ">
    <!-- Header: avatar + name + email -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div id="dd-av" style="width:40px;height:40px;border-radius:50%;background:#1A1916;color:#FAFAF8;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;"></div>
      <div>
        <div id="dd-name" style="font-size:13px;font-weight:600;color:#1A1916;margin-bottom:2px;">—</div>
        <div id="dd-email-hdr" style="font-size:11px;color:#8A8880;"></div>
      </div>
    </div>
    <div style="height:1px;background:rgba(26,25,22,0.10);margin-bottom:14px;"></div>
    <!-- Person ID -->
    <div style="margin-bottom:10px;">
      <div style="font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#8A8880;margin-bottom:4px;">Person ID</div>
      <div id="dd-pid" style="font-size:12px;color:#1A1916;background:#EBE7DF;border:1px solid rgba(26,25,22,0.10);padding:7px 10px;border-radius:2px;">—</div>
    </div>
    <!-- Email -->
    <div style="margin-bottom:14px;">
      <div style="font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#8A8880;margin-bottom:4px;">Email</div>
      <div id="dd-email" style="font-size:12px;color:#1A1916;background:#EBE7DF;border:1px solid rgba(26,25,22,0.10);padding:7px 10px;border-radius:2px;word-break:break-all;">—</div>
    </div>
    <!-- Actions -->
    <div style="display:flex;gap:8px;border-top:1px solid rgba(26,25,22,0.10);padding-top:14px;flex-wrap:wrap;">
      <button onclick="ddCopy('pid')"  style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;padding:7px 12px;border:1px solid rgba(26,25,22,0.20);background:transparent;color:#4A4844;border-radius:2px;cursor:pointer;">Copy ID</button>
      <button onclick="ddCopy('email')" style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;padding:7px 12px;border:1px solid rgba(26,25,22,0.20);background:transparent;color:#4A4844;border-radius:2px;cursor:pointer;">Copy Email</button>
      <button onclick="doSignOut()"    style="font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;padding:7px 12px;border:1px solid rgba(138,48,48,0.30);background:transparent;color:#8a3030;border-radius:2px;cursor:pointer;">Sign Out</button>
    </div>
  </div>

  <button class="nav-btn" onclick="doSignOut()">Sign out</button>
</nav>
