<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TailorTech — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F0EDE6;--cream-mid:#EBE7DF;--cream-dark:#E5E1D8;
  --ink:#1A1916;--ink-mid:#4A4844;--ink-light:#8A8880;--ink-faint:#C0BDB8;
  --white:#FAFAF8;--border:rgba(26,25,22,0.10);--border-mid:rgba(26,25,22,0.20);
}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;}

/* ── Navbar container ── */
#tt-nav-container{width:100%;}

/* ── Page ── */
.auth-page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}

/* ── Card ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:3px;width:100%;max-width:400px;padding:40px 36px;}

/* ── Logo ── */
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{width:44px;height:44px;margin:0 auto 14px;border:1px solid var(--border-mid);border-radius:2px;display:flex;align-items:center;justify-content:center;color:var(--ink-mid);}
.logo h1{font-size:13px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink);margin-bottom:4px;}
.logo p{font-size:12px;color:var(--ink-faint);letter-spacing:0.04em;}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;}
.tab{flex:1;padding:12px 0;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;border:none;background:none;color:var(--ink-faint);cursor:pointer;transition:all 0.2s;border-bottom:1.5px solid transparent;margin-bottom:-1px;}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);}

/* ── Banners ── */
.banner{font-size:12px;letter-spacing:0.02em;line-height:1.5;padding:10px 14px;border-radius:2px;margin-bottom:16px;display:none;}
.banner-err{background:rgba(160,64,64,0.08);border:1px solid rgba(160,64,64,0.2);color:#7a2c2c;}
.banner-ok{background:rgba(61,122,90,0.08);border:1px solid rgba(61,122,90,0.2);color:#2a5c3f;}

/* ── Google btn ── */
.btn-google{width:100%;padding:11px 16px;margin-bottom:16px;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;background:var(--white);border:1px solid var(--border-mid);border-radius:2px;color:var(--ink-mid);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-google:hover{background:var(--cream-mid);color:var(--ink);}

.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;color:var(--ink-faint);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── Fields ── */
.field{margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-light);margin-bottom:6px;}
.field input{width:100%;padding:10px 14px;font-family:'Jost',sans-serif;font-size:14px;background:var(--white);border:1px solid var(--border-mid);border-radius:2px;color:var(--ink);outline:none;transition:border-color 0.15s;-webkit-appearance:none;}
.field input:focus{border-color:var(--ink);}
.field input::placeholder{color:var(--ink-faint);}

.forgot{text-align:right;margin:-6px 0 16px;}
.forgot button{font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.06em;background:none;border:none;color:var(--ink-light);cursor:pointer;transition:color 0.15s;}
.forgot button:hover{color:var(--ink);}

/* ── Submit ── */
.btn-submit{width:100%;padding:13px;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;background:var(--ink);color:var(--white);border:none;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s;margin-top:4px;}
.btn-submit:hover{background:#2d2c29;}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;}
.spin{width:14px;height:14px;border:1.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.65s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Welcome popup ── */
.overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(26,25,22,0.55);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1.5rem;}
.overlay.open{display:flex;}
.popup{background:var(--white);border:1px solid var(--border-mid);border-radius:3px;width:100%;max-width:420px;padding:32px 28px 28px;box-shadow:0 24px 60px rgba(26,25,22,0.18);}
.popup-eyebrow{font-size:9px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;}
.popup-title{font-size:20px;font-weight:300;letter-spacing:-0.01em;color:var(--ink);margin-bottom:4px;}
.popup-sub{font-size:12px;color:var(--ink-faint);margin-bottom:24px;line-height:1.5;}
.popup .field-row{margin-bottom:0;}
.popup-btns{display:flex;gap:10px;margin-top:22px;border-top:1px solid var(--border);padding-top:20px;}
.btn-popup-save{flex:1;padding:11px;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;background:var(--ink);color:var(--white);border:none;border-radius:2px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-popup-save:hover{background:#2d2c29;}
.btn-popup-save:disabled{opacity:0.45;cursor:not-allowed;}
.btn-popup-later{padding:11px 16px;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.10em;text-transform:uppercase;background:transparent;color:var(--ink-mid);border:1px solid var(--border-mid);border-radius:2px;cursor:pointer;transition:all 0.15s;}
.btn-popup-later:hover{background:var(--cream-mid);color:var(--ink);}

/* ── Version ── */
.version{position:fixed;bottom:14px;right:18px;font-size:10px;font-weight:500;letter-spacing:0.10em;text-transform:uppercase;color:rgba(26,25,22,0.25);pointer-events:none;}
</style>
</head>
<body>

<!-- Shared navbar -->
<div id="tt-nav-container"></div>
<script>
fetch('/navbar.html')
  .then(function(r){ return r.text(); })
  .then(function(html){
    document.getElementById('tt-nav-container').innerHTML = html;
    // Show Log In by default on auth page — Firebase will update
    setTimeout(function(){
      if (window.ttNbSetUser) ttNbSetUser(null, null);
    }, 200);
  }).catch(function(){});
</script>

<!-- Auth page -->
<div class="auth-page">
  <div class="card" id="auth-card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/>
        </svg>
      </div>
      <h1>TailorTech</h1>
      <p>Your personal online tailor</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('signin',this)">Sign In</button>
      <button class="tab" onclick="switchTab('register',this)">Create Account</button>
    </div>

    <div class="banner banner-err" id="b-err"></div>
    <div class="banner banner-ok"  id="b-ok"></div>

    <!-- Google -->
    <button class="btn-google" onclick="signInGoogle()">
      <svg width="16" height="16" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <!-- Sign In form -->
    <div id="form-signin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter')doSignIn()">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="si-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()">
      </div>
      <div class="forgot"><button onclick="doForgot()">Forgot password?</button></div>
      <button class="btn-submit" id="btn-signin" onclick="doSignIn()">
        <span id="signin-lbl">Sign In</span>
        <div class="spin" id="signin-spin"></div>
      </button>
    </div>

    <!-- Register form -->
    <div id="form-register" style="display:none">
      <div class="field-row">
        <div class="field" style="margin-bottom:0"><label>First Name *</label><input type="text" id="rg-fname" placeholder="Jane" autocomplete="given-name"></div>
        <div class="field" style="margin-bottom:0"><label>Last Name</label><input type="text" id="rg-lname" placeholder="Doe" autocomplete="family-name"></div>
      </div>
      <div class="field" style="margin-top:14px"><label>Email *</label><input type="email" id="rg-email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="field"><label>Password *</label><input type="password" id="rg-pass" placeholder="Min. 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="btn-submit" id="btn-register" onclick="doRegister()">
        <span id="register-lbl">Create Account</span>
        <div class="spin" id="register-spin"></div>
      </button>
    </div>
  </div>

  <!-- Signed-in state (while redirecting) -->
  <div class="card" id="signed-in-card" style="display:none;text-align:center;">
    <div style="width:52px;height:52px;border-radius:50%;background:var(--ink);color:var(--white);font-size:18px;font-weight:500;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;overflow:hidden;" id="si-avatar"></div>
    <div style="font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px;" id="si-name">Welcome back</div>
    <div style="font-size:12px;color:var(--ink-faint);margin-bottom:20px;" id="si-email"></div>
    <div style="font-size:11px;color:var(--ink-light);letter-spacing:0.04em;">Redirecting…</div>
  </div>
</div>

<!-- Welcome popup -->
<div class="overlay" id="welcome-overlay">
  <div class="popup">
    <div class="popup-eyebrow">New Account</div>
    <div class="popup-title">Welcome to TailorTech</div>
    <div class="popup-sub">Complete your profile. You can always update details later.</div>
    <div class="field"><label>Email Address</label><input type="email" id="wp-email" readonly style="opacity:0.6;cursor:not-allowed;background:var(--cream-dark);"></div>
    <div class="field-row">
      <div class="field" style="margin-bottom:0"><label>First Name *</label><input type="text" id="wp-fname" placeholder="Jane" autocomplete="given-name"></div>
      <div class="field" style="margin-bottom:0"><label>Last Name</label><input type="text" id="wp-lname" placeholder="Doe" autocomplete="family-name"></div>
    </div>
    <div class="field" style="margin-top:14px"><label>Phone</label><input type="tel" id="wp-phone" placeholder="+1 234 567 8900" autocomplete="tel"></div>
    <div class="field"><label>Instagram</label><input type="text" id="wp-ig" placeholder="@username"></div>
    <div class="popup-btns">
      <button class="btn-popup-save" id="wp-save-btn" onclick="wpSave()">
        <span id="wp-save-lbl">Save Profile</span>
        <div class="spin" id="wp-spinner"></div>
      </button>
      <button class="btn-popup-later" onclick="wpLater()">Update Later</button>
    </div>
  </div>
</div>


<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup,
         sendPasswordResetEmail, updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const SHEETS_API = "https://script.google.com/macros/s/AKfycby2SXeZ-Xezbnc739SuHwvxIf8crKwMpwn-dkRULlimtA9IQBShIKoyMXQUBbh2X3Uk/exec";
const DASHBOARD  = "https://tailortech.toom.design/dashboard.html";

const _app  = initializeApp({
  apiKey:            "AIzaSyDTbes2CnVEahG0UO3xzZlD9Z5wlSel3XY",
  authDomain:        "tailortech-accounts.firebaseapp.com",
  projectId:         "tailortech-accounts",
  storageBucket:     "tailortech-accounts.firebasestorage.app",
  messagingSenderId: "137614433833",
  appId:             "1:137614433833:web:c78ea40b0d04ba89f3c638"
});
const _auth = getAuth(_app);
const _gp   = new GoogleAuthProvider();
_gp.setCustomParameters({ prompt: 'select_account' });

window._fb = {
  auth: _auth, signOut,
  async sheetReq(action, payload) {
    payload = payload || {};
    const user  = _auth.currentUser;
    const token = user ? await user.getIdToken() : null;
    const res   = await fetch(SHEETS_API, {
      method: 'POST',
      body: JSON.stringify({ action, token,
        email: user ? user.email : null,
        uid:   user ? user.uid   : null,
        ...payload })
    });
    return res.json();
  }
};

onAuthStateChanged(_auth, function(user) {
  if (user) {
    showSignedIn(user);
    if (window.ttNbSetUser) ttNbSetUser(user, null);
    checkIfNewClient(user);
  }
});

window._signInGoogle = function() {
  signInWithPopup(_auth, _gp).catch(function(e) {
    if (e.code !== 'auth/popup-closed-by-user') showErr(errMsg(e.code));
  });
};
window._doSignIn = function(email, pass) {
  return signInWithEmailAndPassword(_auth, email, pass);
};
window._doRegister = function(email, pass, fname, lname) {
  return createUserWithEmailAndPassword(_auth, email, pass)
    .then(function(cred) {
      return updateProfile(cred.user, { displayName: fname + (lname ? ' ' + lname : '') });
    });
};
window._doForgot = function(email) {
  return sendPasswordResetEmail(_auth, email);
};
</script>

<script>
'use strict';
var _wpUser = null;
var DASHBOARD = 'https://tailortech.toom.design/dashboard.html';

// ── Return URL: go back to wherever the user came from ────────────
function getReturnUrl() {
  try {
    var url = sessionStorage.getItem('tt_return_url');
    sessionStorage.removeItem('tt_return_url');
    if (url && url.indexOf('https://tailortech.toom.design/') === 0) return url;
  } catch(e) {}
  return DASHBOARD;
}
function redirectAfterLogin() {
  window.location.href = getReturnUrl();
}

function clearBanners(){document.getElementById('b-err').style.display='none';document.getElementById('b-ok').style.display='none';}
function showErr(msg){clearBanners();var e=document.getElementById('b-err');e.textContent=msg;e.style.display='block';}
function showOk(msg){clearBanners();var e=document.getElementById('b-ok');e.textContent=msg;e.style.display='block';}

function switchTab(tab,el){
  clearBanners();
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('form-signin').style.display   = tab==='signin'   ? '' : 'none';
  document.getElementById('form-register').style.display = tab==='register' ? '' : 'none';
}

function setLoading(id,on){
  var btn=document.getElementById('btn-'+id),lbl=document.getElementById(id+'-lbl'),sp=document.getElementById(id+'-spin');
  btn.disabled=on;lbl.style.display=on?'none':'';sp.style.display=on?'block':'none';
}

function errMsg(code){
  var m={
    'auth/user-not-found':'No account found with this email.',
    'auth/wrong-password':'Incorrect password.',
    'auth/invalid-credential':'Incorrect email or password.',
    'auth/email-already-in-use':'An account with this email already exists.',
    'auth/invalid-email':'Please enter a valid email address.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/too-many-requests':'Too many attempts. Please wait.',
    'auth/popup-blocked':'Popup blocked — please allow popups for this site.',
    'auth/network-request-failed':'Network error. Check your connection.',
  };
  return m[code]||'Something went wrong. Please try again.';
}

function signInGoogle(){
  clearBanners();
  if (!window._signInGoogle){showErr('Loading… try again in a moment.');return;}
  window._signInGoogle();
}

function doSignIn(){
  clearBanners();
  var email=document.getElementById('si-email').value.trim();
  var pass=document.getElementById('si-pass').value;
  if(!email||!pass){showErr('Please enter your email and password.');return;}
  setLoading('signin',true);
  window._doSignIn(email,pass)
    .catch(function(e){showErr(errMsg(e.code));})
    .finally(function(){setLoading('signin',false);});
}

function doRegister(){
  clearBanners();
  var fname=document.getElementById('rg-fname').value.trim();
  var lname=document.getElementById('rg-lname').value.trim();
  var email=document.getElementById('rg-email').value.trim();
  var pass=document.getElementById('rg-pass').value;
  if(!fname||!email||!pass){showErr('Please fill in all required fields.');return;}
  if(pass.length<6){showErr('Password must be at least 6 characters.');return;}
  setLoading('register',true);
  window._doRegister(email,pass,fname,lname)
    .catch(function(e){showErr(errMsg(e.code));})
    .finally(function(){setLoading('register',false);});
}

function doForgot(){
  clearBanners();
  var email=document.getElementById('si-email').value.trim();
  if(!email){showErr('Enter your email above first.');return;}
  window._doForgot(email)
    .then(function(){showOk('Reset email sent — check your inbox.');})
    .catch(function(e){showErr(errMsg(e.code));});
}

function showSignedIn(user){
  document.getElementById('auth-card').style.display='none';
  document.getElementById('signed-in-card').style.display='block';
  var av=document.getElementById('si-avatar');
  if(user.photoURL) av.innerHTML='<img src="'+user.photoURL+'" style="width:100%;height:100%;object-fit:cover;" alt="">';
  else av.textContent=(user.displayName||user.email||'?')[0].toUpperCase();
  document.getElementById('si-name').textContent=user.displayName||'Welcome back';
  document.getElementById('si-email').textContent=user.email;
}

// ── JSONP saveClient ──────────────────────────────────────────────
var SHEETS_API = 'https://script.google.com/macros/s/AKfycby2SXeZ-Xezbnc739SuHwvxIf8crKwMpwn-dkRULlimtA9IQBShIKoyMXQUBbh2X3Uk/exec';
function saveClientJSONP(data,callback){
  var cbName='__ttAuth_'+Date.now();
  var payload=encodeURIComponent(JSON.stringify(data));
  var url=SHEETS_API+'?action=saveClient&payload='+payload+'&callback='+cbName;
  var script=document.createElement('script');
  var timer=setTimeout(function(){cleanup();if(callback)callback({success:true,action:'sent'});},6000);
  function cleanup(){clearTimeout(timer);delete window[cbName];if(script.parentNode)document.body.removeChild(script);}
  window[cbName]=function(res){cleanup();if(callback)callback(res);};
  script.onerror=function(){cleanup();if(callback)callback({success:false});};
  script.src=url;document.body.appendChild(script);
}

function checkIfNewClient(user){
  _wpUser=user;
  window._fb.sheetReq('getClient',{uid:user.uid})
    .then(function(res){
      if(res&&res.success&&res.client&&res.client['Email']){
        redirectAfterLogin();
      } else {
        // Save minimum data immediately
        saveClientJSONP({uid:user.uid,email:user.email,data:{
          'UID':user.uid,'Email':user.email,
          'First Name':user.displayName?user.displayName.split(' ')[0]:'',
          'Last Name':user.displayName?user.displayName.split(' ').slice(1).join(' '):'',
        }},function(){});
        showWelcomePopup(user);
      }
    })
    .catch(function(){redirectAfterLogin();});
}

function showWelcomePopup(user){
  var el=document.getElementById('wp-email');
  if(el) el.value=user.email||'';
  if(user.displayName){
    var parts=user.displayName.split(' ');
    var fn=document.getElementById('wp-fname'),ln=document.getElementById('wp-lname');
    if(fn&&!fn.value) fn.value=parts[0]||'';
    if(ln&&!ln.value) ln.value=parts.slice(1).join(' ')||'';
  }
  document.getElementById('welcome-overlay').classList.add('open');
}

function wpSave(){
  if(!_wpUser) return;
  var fname=document.getElementById('wp-fname').value.trim();
  var lname=document.getElementById('wp-lname').value.trim();
  var phone=document.getElementById('wp-phone').value.trim();
  var ig=document.getElementById('wp-ig').value.trim();
  var btn=document.getElementById('wp-save-btn'),lbl=document.getElementById('wp-save-lbl'),sp=document.getElementById('wp-spinner');
  btn.disabled=true;lbl.style.display='none';sp.style.display='block';
  saveClientJSONP({uid:_wpUser.uid,email:_wpUser.email,data:{
    'UID':_wpUser.uid,'First Name':fname,'Last Name':lname,
    'Email':_wpUser.email,'Phone Number':phone,'IG':ig,
  }},function(){redirectAfterLogin();});
}

function wpLater(){
  if(!_wpUser){redirectAfterLogin();return;}
