<!-- TailorTech Shared Navbar v2.0 — edit this file to update nav on all pages -->
<style>
  .tt-nb{height:52px;background:#FAFAF8;border-bottom:1px solid rgba(26,25,22,0.10);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:100;font-family:'Jost',sans-serif;box-sizing:border-box;width:100%;}
  .tt-nb-brand{font-size:12px;font-weight:600;letter-spacing:0.20em;text-transform:uppercase;color:#1A1916;text-decoration:none;margin-right:auto;}
  .tt-nb-btn{font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.10em;text-transform:uppercase;padding:7px 16px;border:1px solid rgba(26,25,22,0.20);border-radius:2px;background:transparent;color:#4A4844;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;text-decoration:none;white-space:nowrap;}
  .tt-nb-btn:hover{background:#EBE7DF;color:#1A1916;}
  .tt-nb-av{width:30px;height:30px;border-radius:50%;background:#1A1916;color:#FAFAF8;font-size:11px;font-weight:600;letter-spacing:0;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;cursor:pointer;border:none;padding:0;}
  .tt-nb-av img{width:100%;height:100%;object-fit:cover;}
  /* Popover */
  .tt-nb-pop{position:fixed;top:60px;right:28px;width:min(340px,calc(100vw - 32px));background:#FAFAF8;border:1px solid rgba(26,25,22,0.20);border-radius:2px;box-shadow:0 18px 48px rgba(26,25,22,0.16);padding:18px;z-index:9999;display:none;}
  .tt-nb-pop.open{display:block;}
  .tt-nb-pop::before{content:'';position:absolute;top:-7px;right:12px;width:12px;height:12px;background:#FAFAF8;border-left:1px solid rgba(26,25,22,0.20);border-top:1px solid rgba(26,25,22,0.20);transform:rotate(45deg);}
  .tt-nb-pop-title{font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#C0BDB8;margin-bottom:14px;}
  .tt-nb-pop-row{margin-bottom:12px;}
  .tt-nb-pop-lbl{font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#8A8880;margin-bottom:4px;}
  .tt-nb-pop-val{font-size:12px;color:#1A1916;word-break:break-all;background:#EBE7DF;border:1px solid rgba(26,25,22,0.10);padding:8px 10px;border-radius:2px;}
  .tt-nb-pop-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .tt-nb-pop-btn{font-family:'Jost',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;padding:7px 14px;border:1px solid rgba(26,25,22,0.20);background:transparent;color:#4A4844;border-radius:2px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;}
  .tt-nb-pop-btn:hover{background:#EBE7DF;}
  .tt-nb-pop-btn.dark{background:#1A1916;color:#FAFAF8;border-color:#1A1916;}
  .tt-nb-pop-btn.dark:hover{background:#2d2c29;}
</style>

<nav class="tt-nb">
  <a class="tt-nb-brand" href="https://tailortech.toom.design/">TailorTech</a>
  <!-- Avatar (signed in) -->
  <button class="tt-nb-av" id="tt-nb-av" onclick="ttNbToggle(event)" style="display:none"></button>
  <!-- Log In (signed out) -->
  <a class="tt-nb-btn" id="tt-nb-login" href="https://tailortech.toom.design/auth.html">Log In</a>
  <!-- Sign Out (signed in) -->
  <button class="tt-nb-btn" id="tt-nb-signout" onclick="ttNbSignOut()" style="display:none">Sign Out</button>
</nav>

<!-- Popover -->
<div class="tt-nb-pop" id="tt-nb-pop">
  <div class="tt-nb-pop-title">My Account</div>
  <div class="tt-nb-pop-row">
    <div class="tt-nb-pop-lbl">Person ID</div>
    <div class="tt-nb-pop-val" id="tt-nb-pid">—</div>
  </div>
  <div class="tt-nb-pop-row">
    <div class="tt-nb-pop-lbl">Email</div>
    <div class="tt-nb-pop-val" id="tt-nb-email">—</div>
  </div>
  <div class="tt-nb-pop-actions">
    <button class="tt-nb-pop-btn" onclick="ttNbCopy('pid')">Copy ID</button>
    <button class="tt-nb-pop-btn" onclick="ttNbCopy('email')">Copy Email</button>
    <a class="tt-nb-pop-btn dark" href="https://tailortech.toom.design/dashboard.html">Dashboard</a>
  </div>
</div>

<script>
(function(){
  // ── Restore user from sessionStorage on pages without Firebase ───
  try {
    var stored = sessionStorage.getItem('tt_user');
    if (stored) {
      var u = JSON.parse(stored);
      // Defer until DOM ready
      setTimeout(function() {
        if (window.ttNbSetUser) ttNbSetUser(u, u.personId || null);
      }, 50);
    }
  } catch(e) {}

  // Toggle popover
  window.ttNbToggle = function(e) {
    if (e) e.stopPropagation();
    document.getElementById('tt-nb-pop').classList.toggle('open');
  };
  document.addEventListener('click', function(e) {
    var p = document.getElementById('tt-nb-pop');
    var a = document.getElementById('tt-nb-av');
    if (p && !p.contains(e.target) && (!a || !a.contains(e.target)))
      p.classList.remove('open');
  });

  // Copy
  window.ttNbCopy = function(type) {
    var el = document.getElementById(type === 'pid' ? 'tt-nb-pid' : 'tt-nb-email');
    var v  = el ? el.textContent.trim() : '';
    if (!v || v === '—') return;
    if (navigator.clipboard) navigator.clipboard.writeText(v);
  };

  // Sign out — works with both _d (dashboard Firebase) and _fb (auth Firebase)
  window.ttNbSignOut = function() {
    try { sessionStorage.removeItem('tt_user'); } catch(e) {}
    var auth = (window._d && window._d.auth) || (window._fb && window._fb.auth);
    var so   = (window._d && window._d.signOut) || (window._fb && window._fb.signOut);
    if (auth && so) {
      so(auth).then(function(){ window.location.href = 'https://tailortech.toom.design/auth.html'; });
    } else {
      window.location.href = 'https://tailortech.toom.design/auth.html';
    }
  };

  // Called by each page to set user state
  window.ttNbSetUser = function(user, personId) {
    var av      = document.getElementById('tt-nb-av');
    var login   = document.getElementById('tt-nb-login');
    var signout = document.getElementById('tt-nb-signout');
    var pidEl   = document.getElementById('tt-nb-pid');
    var emailEl = document.getElementById('tt-nb-email');

    if (user && user.email) {
      // Persist across pages
      try {
        sessionStorage.setItem('tt_user', JSON.stringify({
          email:       user.email,
          displayName: user.displayName || '',
          photoURL:    user.photoURL    || '',
          uid:         user.uid         || '',
          personId:    personId         || '',
        }));
      } catch(e) {}
      if (av) {
        av.style.display = 'flex';
        if (user.photoURL) av.innerHTML = '<img src="' + user.photoURL + '" alt="">';
        else av.textContent = (user.displayName || user.email)[0].toUpperCase();
      }
      if (login)   login.style.display   = 'none';
      if (signout) signout.style.display  = '';
      if (pidEl)   pidEl.textContent      = personId || '—';
      if (emailEl) emailEl.textContent    = user.email;
    } else {
      if (av)      av.style.display       = 'none';
      if (login)   login.style.display    = '';
      if (signout) signout.style.display  = 'none';
    }
  };
})();
</script>
